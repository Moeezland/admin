<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moeezland Authority</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Immigration & Civil Status Authority</h1>

<!-- ✈️ Issue Visa -->

<div class="card">
  <h2>Issue Visa</h2>
  <input id="eborder" placeholder="e-Border (MOE26000001)">

  <select id="visaType">
    <option value="TR">Tourist</option>
    <option value="WK">Work</option>
    <option value="ST">Student</option>
    <option value="FM">Family</option>
    <option value="BS">Business</option>
  </select>

<button onclick="issueVisa()">Issue Visa</button>

</div>

<!-- 🪪 Issue Civil ID -->

<div class="card">
  <h2>Issue Civil ID</h2>
  <input id="eborderCID" placeholder="e-Border (MOE26000001)">

<button onclick="issueCivilID()">Issue Civil ID</button>

</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
